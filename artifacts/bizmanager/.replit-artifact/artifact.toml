kind = "web"
previewPath = "/"
title = "Business Manager"
version = "1.0.0"
id = "artifacts/bizmanager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24425

[services.development]
run = "pnpm --filter @workspace/bizmanager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bizmanager", "run", "build" ]
publicDir = "artifacts/bizmanager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24425"
BASE_PATH = "/"
